name: .NET CI (Demo)

# Build the Zava Storefront ASP.NET Core app on every push / PR.
on:
  push:
    branches: ["interview-demo", "main"]
  pull_request:
    branches: ["interview-demo", "main"]
  workflow_dispatch:

# Least privilege: this workflow only needs to read the repository contents.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: dotnet-ci-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ZavaStorefront.sln

      - name: Build
        run: dotnet build src/ZavaStorefront.sln --configuration Release --no-restore

      - name: Test
        # No test projects exist yet; this step is a no-op placeholder that stays
        # green and is ready to run unit tests once a test project is added.
        run: echo "No test projects yet. Add a test project to enable 'dotnet test'."